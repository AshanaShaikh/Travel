<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explore — Travel Guide</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── HEADER ── -->
  <header class="header">
    <div class="header-bg"></div>
    <div class="header-content">
      <div class="logo">
        <span class="logo-icon">✦</span>
        <span class="logo-text">Explore</span>
      </div>
      <p class="header-tagline">Your Personal Travel Chronicle</p>
      <div class="stats-bar" id="statsBar">
        <div class="stat-item"><span class="stat-num" id="statTotal">—</span><span class="stat-label">Destinations</span></div>
        <div class="stat-divider">|</div>
        <div class="stat-item"><span class="stat-num" id="statCountries">—</span><span class="stat-label">Countries</span></div>
        <div class="stat-divider">|</div>
        <div class="stat-item"><span class="stat-num" id="statRating">—</span><span class="stat-label">Avg. Rating</span></div>
      </div>
      <button class="btn-add-hero" id="btnOpenAdd">
        <span>+ Add Destination</span>
      </button>
    </div>
  </header>

  <!-- ── TOOLBAR ── -->
  <section class="toolbar">
    <div class="toolbar-inner">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="searchInput" class="search-input" placeholder="Search destinations, countries..." />
      </div>
      <div class="filters">
        <select id="filterCategory" class="filter-select">
          <option value="All">All Categories</option>
          <option>Adventure</option>
          <option>Cultural</option>
          <option>Beach</option>
          <option>Mountain</option>
          <option>City</option>
          <option>Wildlife</option>
          <option>Historical</option>
        </select>
        <select id="filterBudget" class="filter-select">
          <option value="All">All Budgets</option>
          <option>Budget</option>
          <option>Mid-range</option>
          <option>Luxury</option>
        </select>
        <select id="sortSelect" class="filter-select">
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
          <option value="rating">Top Rated</option>
          <option value="name">A–Z</option>
        </select>
      </div>
    </div>
    <div class="results-info" id="resultsInfo">Loading destinations...</div>
  </section>

  <!-- ── CARD GRID ── -->
  <main class="main-grid" id="cardGrid">
    <!-- Cards injected by JS -->
  </main>

  <!-- ── EMPTY STATE ── -->
  <div class="empty-state hidden" id="emptyState">
    <div class="empty-icon">🗺️</div>
    <h3>No destinations found</h3>
    <p>Try adjusting your filters or add a new destination.</p>
    <button class="btn-primary" onclick="openModal()">Add First Destination</button>
  </div>

  <!-- ── MODAL OVERLAY ── -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Add Destination</h2>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <form id="destForm" class="modal-form" onsubmit="return false;">
        <input type="hidden" id="editId" />

        <div class="form-row">
          <div class="form-group">
            <label>Destination Name *</label>
            <input type="text" id="fName" placeholder="e.g. Paris" required />
          </div>
          <div class="form-group">
            <label>Country *</label>
            <input type="text" id="fCountry" placeholder="e.g. France" required />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Category *</label>
            <select id="fCategory" required>
              <option value="">Select category</option>
              <option>Adventure</option>
              <option>Cultural</option>
              <option>Beach</option>
              <option>Mountain</option>
              <option>City</option>
              <option>Wildlife</option>
              <option>Historical</option>
            </select>
          </div>
          <div class="form-group">
            <label>Budget Range</label>
            <select id="fBudget">
              <option>Budget</option>
              <option selected>Mid-range</option>
              <option>Luxury</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Best Season to Visit</label>
            <input type="text" id="fSeason" placeholder="e.g. June – September" />
          </div>
          <div class="form-group">
            <label>Rating (0.0 – 5.0)</label>
            <input type="number" id="fRating" min="0" max="5" step="0.1" placeholder="4.5" />
          </div>
        </div>

        <div class="form-group full">
          <label>Description</label>
          <textarea id="fDesc" rows="3" placeholder="Describe what makes this place special..."></textarea>
        </div>

        <div class="form-group full">
          <label>Image URL</label>
          <input type="url" id="fImage" placeholder="https://..." />
          <div class="img-preview-wrap">
            <img id="imgPreview" src="" alt="" class="img-preview hidden" />
          </div>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
          <button type="button" class="btn-primary" id="btnSubmit" onclick="submitForm()">Save Destination</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ── DETAIL MODAL ── -->
  <div class="modal-overlay hidden" id="detailOverlay">
    <div class="modal modal-detail" id="detailModal">
      <button class="modal-close" id="detailClose">✕</button>
      <div id="detailContent"></div>
    </div>
  </div>

  <!-- ── TOAST ── -->
  <div class="toast hidden" id="toast">
    <span id="toastMsg">✓ Done</span>
  </div>

  <!-- ── CONFIRM DELETE ── -->
  <div class="modal-overlay hidden" id="confirmOverlay">
    <div class="modal confirm-modal">
      <div class="confirm-icon">🗑️</div>
      <h3>Delete Destination?</h3>
      <p id="confirmMsg">This action cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeConfirm()">Cancel</button>
        <button class="btn-danger" id="btnConfirmDelete">Delete</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
